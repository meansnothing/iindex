<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ICE GLOVES</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Georgia', serif;
      background: #ffb6c1;
      min-height: 100vh;
    }

    /* ── BLOCK 1: HERO ── */
    .hero {
      min-height: 100vh;
      background: #ffb6c1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      padding: 40px 20px;
    }

    /* Floating ice cream SVGs */
    .ice-float {
      position: absolute;
      opacity: 0.55;
      animation: floaty 6s ease-in-out infinite;
      pointer-events: none;
      user-select: none;
    }
    .ice-float:nth-child(1)  { top: 5%;  left: 3%;  width: 70px;  animation-delay: 0s;    animation-duration: 7s; }
    .ice-float:nth-child(2)  { top: 12%; right: 6%; width: 55px;  animation-delay: 1s;    animation-duration: 5s; }
    .ice-float:nth-child(3)  { top: 40%; left: 1%;  width: 80px;  animation-delay: 2s;    animation-duration: 8s; }
    .ice-float:nth-child(4)  { top: 60%; right: 2%; width: 65px;  animation-delay: 0.5s;  animation-duration: 6s; }
    .ice-float:nth-child(5)  { bottom: 10%; left: 8%;  width: 60px;  animation-delay: 3s; animation-duration: 7s; }
    .ice-float:nth-child(6)  { bottom: 5%;  right: 10%; width: 75px; animation-delay: 1.5s; animation-duration: 5.5s; }
    .ice-float:nth-child(7)  { top: 25%; left: 20%; width: 45px;  animation-delay: 4s;    animation-duration: 9s; }
    .ice-float:nth-child(8)  { top: 70%; left: 30%; width: 50px;  animation-delay: 2.5s;  animation-duration: 6.5s; }
    .ice-float:nth-child(9)  { top: 15%; left: 45%; width: 40px;  animation-delay: 1.2s;  animation-duration: 7.5s; }
    .ice-float:nth-child(10) { bottom: 20%; right: 25%; width: 55px; animation-delay: 3.5s; animation-duration: 8s; }

    @keyframes floaty {
      0%, 100% { transform: translateY(0px) rotate(-3deg); }
      50%       { transform: translateY(-14px) rotate(3deg); }
    }

    .hero-content {
      position: relative;
      z-index: 2;
      text-align: center;
    }

    .hero-title {
      font-size: clamp(3rem, 12vw, 8rem);
      font-weight: 900;
      letter-spacing: -2px;
      color: #fff;
      text-shadow:
        3px 3px 0 #e05080,
        6px 6px 0 #c03060,
        -1px -1px 0 #e07090;
      line-height: 1;
    }

    .hero-subtitle {
      margin-top: 18px;
      font-size: clamp(0.95rem, 3vw, 1.4rem);
      color: #7a2040;
      font-style: italic;
      letter-spacing: 1px;
    }

    .hero-arrow {
      margin-top: 40px;
      font-size: 2rem;
      color: #fff;
      animation: bounce 1.5s ease-in-out infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(8px); }
    }

    /* ── BLOCK 2: ORDER ── */
    .order {
      min-height: 100vh;
      background: #fff0f5;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px 20px;
    }

    .order-card {
      background: #fff;
      border-radius: 28px;
      padding: 50px 40px;
      max-width: 420px;
      width: 100%;
      box-shadow: 0 8px 40px rgba(200, 50, 100, 0.12);
      text-align: center;
    }

    .order-card h2 {
      font-size: clamp(1.5rem, 5vw, 2rem);
      color: #c03060;
      margin-bottom: 8px;
    }

    .order-card p {
      color: #999;
      font-size: 0.95rem;
      margin-bottom: 36px;
    }

    .counter-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      margin-bottom: 20px;
    }

    .counter-btn {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: 2px solid #e05080;
      background: transparent;
      color: #e05080;
      font-size: 1.6rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
      line-height: 1;
    }

    .counter-btn:hover {
      background: #e05080;
      color: #fff;
    }

    .counter-value {
      font-size: 2.5rem;
      font-weight: 700;
      color: #333;
      min-width: 50px;
    }

    .price-display {
      font-size: 1.8rem;
      font-weight: 700;
      color: #c03060;
      margin-bottom: 10px;
    }

    .price-note {
      font-size: 0.85rem;
      color: #bbb;
      margin-bottom: 32px;
    }

    .order-btn {
      display: inline-block;
      background: linear-gradient(135deg, #e05080, #c03060);
      color: #fff;
      text-decoration: none;
      font-size: 1.1rem;
      font-weight: 700;
      padding: 16px 40px;
      border-radius: 50px;
      letter-spacing: 1px;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 4px 20px rgba(200, 50, 100, 0.35);
    }

    .order-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(200, 50, 100, 0.45);
    }

    @media (max-width: 480px) {
      .order-card { padding: 36px 24px; }
    }
  </style>
</head>

<!-- ── BLOCK 2: ORDER ── -->
<section class="order">
  <div class="order-card">
    <h2>Order Your Gloves</h2>
    <p>$5 per unit — choose your quantity</p>

    <div class="counter-row">
      <button class="counter-btn" id="minus" aria-label="Decrease">−</button>
      <span class="counter-value" id="qty">1</span>
      <button class="counter-btn" id="plus" aria-label="Increase">+</button>
    </div>

    <div class="price-display" id="price">$5</div>
    <div class="price-note">Free shipping on orders over 20 units</div>

    <a class="order-btn" id="order-link" href="https://t.me/icecreambeatstore" target="_blank" rel="noopener">
      Order Now →
    </a>
  </div>
</section>

<script>
  let qty = 1;
  const qtyEl    = document.getElementById('qty');
  const priceEl  = document.getElementById('price');
  const minusBtn = document.getElementById('minus');

  function update() {
    qtyEl.textContent   = qty;
    priceEl.textContent = '$' + (qty * 5);
    minusBtn.style.opacity = qty <= 1 ? '0.3' : '1';
    minusBtn.disabled      = qty <= 1;
  }

  document.getElementById('plus').addEventListener('click', () => { qty++; update(); });
  document.getElementById('minus').addEventListener('click', () => { if (qty > 1) { qty--; update(); } });

  update();
</script>
